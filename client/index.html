<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BeMerged</title>
  </head>
  <body>
    <div id="app" class="bemerged-root">
      <div id="bemerged-shell">
        <div id="bemerged-main">
          <div id="bemerged-top-row">
            <div id="bemerged-score-slot">
              <div id="score" class="stats-panel">
                <div class="score-grid">
                  <div class="score-stat">Time: <strong id="hud-timer">00:00</strong></div>
                  <div class="score-stat">Move #: <strong id="hud-moves">0</strong></div>
                  <div class="score-stat">Total Merges: <strong id="hud-merges">0</strong></div>
                  <div class="score-stat">Total Shatters: <strong id="hud-shatters">0</strong></div>
                  <div class="score-stat">Total Shards: <strong id="hud-score">0</strong></div>
                  <div class="score-stat">Best Shards: <strong id="hud-best-shards">0</strong></div>
                </div>
                <div id="hud-shards-row" class="shards-row"></div>
                <div class="hidden">Mines: <strong id="hud-mines">0</strong></div>
                <div class="hidden">Boss HP: <strong id="hud-boss-hp">-</strong></div>
                <div class="hidden">Boss Wave: <strong id="hud-boss-wave">0</strong></div>
                <div class="hidden">Boss Phase: <strong id="hud-boss-phase">-</strong></div>
              </div>
            </div>

            <div id="bemerged-inventory-slot">
              <div id="inventory-grid" class="inventory-grid"></div>
            </div>
          </div>

          <div id="bemerged-middle-row">
            <div id="bemerged-chart-slot">
              <section class="chart-panel">
                <img id="merge-chart-image" alt="BeMerged chart" />
              </section>
            </div>

            <div id="bemerged-board-slot">
              <section class="center-panel">
                <div id="bemerged-game-host" class="game-host"></div>
              </section>
            </div>
          </div>

          <div id="bemerged-bottom-row">
            <div id="bemerged-controls-slot">
              <section id="settings-panel" class="settings-panel hidden">
                <div class="settings-grid">
                  <label>
                    Orientation
                    <select id="set-orientation">
                      <option value="landscape">Landscape</option>
                      <option value="portrait">Portrait</option>
                    </select>
                  </label>

                  <label>
                    Auto-shatter rares
                    <input id="set-auto-shatter-rares" type="checkbox" />
                  </label>

                  <label>
                    Disable hints
                    <input id="set-disable-hints" type="checkbox" />
                  </label>

                  <label>
                    Background
                    <select id="set-background"></select>
                  </label>

                  <label>
                    AI delay (ms)
                    <input id="ai-delay" type="number" min="0" max="5000" step="25" value="250" />
                  </label>

                  <label>
                    Enable dev controls
                    <input id="set-enable-dev-controls" type="checkbox" />
                  </label>

                  <div id="dev-controls-group" class="dev-controls-group hidden">
                    <label>
                      AI testing mode
                      <input id="ai-testing" type="checkbox" disabled />
                    </label>
                    <label>Common rate %<input id="set-rate-common" type="number" step="0.1" /></label>
                    <label>Rare rate %<input id="set-rate-rare" type="number" step="0.1" /></label>
                    <label>Epic rate %<input id="set-rate-epic" type="number" step="0.1" /></label>
                    <label>Mine spawn %<input id="set-mine-spawn" type="number" step="0.1" /></label>
                    <label>Mine cooldown<input id="set-mine-cooldown" type="number" step="1" /></label>
                    <label>Mine moves<input id="set-mine-moves" type="number" step="1" /></label>
                    <label>Mine radius<input id="set-mine-radius" type="number" step="1" /></label>
                    <label>Boss spawn every<input id="set-boss-spawn" type="number" step="1" /></label>
                    <label>Boss HP<input id="set-boss-hp" type="number" step="1" /></label>
                    <label>Boss HP step<input id="set-boss-step" type="number" step="1" /></label>
                    <label>Boss threshold<input id="set-boss-threshold" type="number" step="1" /></label>
                    <label>Boss move threshold<input id="set-boss-move-threshold" type="number" step="1" /></label>
                    <label>Boss phase duration<input id="set-boss-phase-duration" type="number" step="1" /></label>
                    <label>Common dmg<input id="set-common-dmg" type="number" step="1" /></label>
                    <label>Rare dmg<input id="set-rare-dmg" type="number" step="1" /></label>
                    <label>Epic dmg<input id="set-epic-dmg" type="number" step="1" /></label>
                    <label>Legendary dmg<input id="set-legendary-dmg" type="number" step="1" /></label>
                    <label>Mythic dmg<input id="set-mythic-dmg" type="number" step="1" /></label>
                    <label>Ancestral dmg<input id="set-ancestral-dmg" type="number" step="1" /></label>
                    <label>Shards per clear<input id="set-shards-per-clear" type="number" step="1" /></label>
                  </div>
                </div>
                <button id="btn-settings-apply" type="button">Apply</button>
              </section>

              <div id="game-controls" class="controls-row">
                <button id="btn-settings" type="button">Settings</button>
                <button id="btn-rules" type="button">Rules</button>
                <button id="btn-ai-toggle" type="button">AI Play</button>
                <button id="btn-shuffle" type="button">Shuffle (3)</button>
                <button id="btn-restart" type="button">Restart</button>
                <button id="btn-hint" type="button">Hint</button>
                <button id="btn-toggle-chart" type="button">Hide Chart</button>
                <span id="hud-ai-status">Idle</span>
              </div>
              <div id="hud-status" class="hud-status"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./standalone.ts"></script>
  </body>
</html>
